<!-- ▼ openFile 修正版（await resetViewers対応・競合防止） -->
<script>
async function openFile(file) {
  state.file       = file;
  state.scale      = 1;
  state.imgX       = 0;
  state.imgY       = 0;
  state.dpr        = getDpr();
  state.measurePts = [];
  ToolManager.set('pan');

  // FIX: async reset待機
  await resetViewers();

  els.viewer.classList.add('show');
  els.name.textContent = file.name;

  const ext = file.name.split('.').pop().toLowerCase();

  try {
    hideControls();

    if (ext === 'zip') {
      await openArchive(file);
      return;
    }

    if (['txt','csv','json','md','log'].includes(ext)) {
      els.text.textContent = await file.text();
      showEl(els.text);
    }

    else if (ext === 'pdf') {
      await renderPDF(file);
      showPDFControls();
    }

    else if (/^(png|jpe?g|webp|gif|svg)$/i.test(ext)) {

      state.url = URL.createObjectURL(file);

      await new Promise((resolve, reject) => {
        els.img.onload = () => resolve();
        els.img.onerror = reject;
        els.img.src = state.url;
      });

      updateImgTransform();
      showEl(els.imgView, 'flex');

      enableImagePanZoom();

      if (state.imageList.length > 1) {
        showImageControls();
      }
    }

    else if (ext === 'dxf') {
      await loadDXF(file);
      showDXFControls();
    }

    else if (ext === 'dwg') {
      openDWG();
      return;
    }

    else if (/^(jww|jwc)$/i.test(ext)) {
      await openJWW(file);
    }

    else {
      showFallback(`${ext.toUpperCase()}は未対応`);
    }

    await saveRecent(file);

  } catch (err) {

    console.error(err);

    showFallback(
      err?.message ||
      String(err)
    );
  }
}
</script>

<!-- ▼ drawPDFPage 完全修正版 -->
<script>
async function drawPDFPage() {

  if (!state.pdfDoc) return;

  const token = ++state.pdfRenderToken;

  // FIX: 古いrender task停止
  try {
    if (state.pdfRenderTask) {
      state.pdfRenderTask.cancel();
    }
  } catch(e){}

  const page = await state.pdfDoc.getPage(state.pdfPage);

  if (token !== state.pdfRenderToken) return;

  const wrapW = els.pdfWrap.clientWidth || window.innerWidth;

  const baseViewport = page.getViewport({ scale: 1 });

  const baseScale =
    (wrapW / baseViewport.width) * 0.95;

  const dpr = getDpr();

  const viewport = page.getViewport({
    scale: baseScale * state.pdfScale * dpr
  });

  // FIX: aspect保持
  const MAX = 4096;

  const ratio = Math.min(
    1,
    MAX / Math.max(viewport.width, viewport.height)
  );

  const finalW = Math.floor(viewport.width * ratio);
  const finalH = Math.floor(viewport.height * ratio);

  els.pdf.width  = finalW;
  els.pdf.height = finalH;

  els.pdfOverlay.width  = finalW;
  els.pdfOverlay.height = finalH;

  const ctx = els.pdf.getContext('2d', {
    alpha:false
  });

  ctx.clearRect(0,0,finalW,finalH);

  const renderViewport = page.getViewport({
    scale:
      baseScale *
      state.pdfScale *
      dpr *
      ratio
  });

  state.pdfRenderTask = page.render({
    canvasContext: ctx,
    viewport: renderViewport,
    intent:'display'
  });

  try {

    await state.pdfRenderTask.promise;

  } catch(e) {

    if (e?.name !== 'RenderingCancelledException') {
      throw e;
    }

    return;
  }

  if (token !== state.pdfRenderToken) return;

  els.pageInfo.textContent =
    `${state.pdfPage}/${state.pdfDoc.numPages}`;

  await loadAnnotation();

  redrawAnnotations();
}
</script>

<!-- ▼ WebGL drawArrays overflow対策 -->
<script>
render() {

  if (!this.initialized) return;

  const gl = this.gl;

  const w = this.canvas.width;
  const h = this.canvas.height;

  gl.viewport(0,0,w,h);

  gl.clearColor(1,1,1,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.useProgram(this.program);

  gl.bindBuffer(gl.ARRAY_BUFFER, this.vbo);

  const BYTES = this._stride;

  gl.enableVertexAttribArray(this.loc.aPos);

  gl.vertexAttribPointer(
    this.loc.aPos,
    2,
    gl.FLOAT,
    false,
    BYTES,
    0
  );

  gl.enableVertexAttribArray(this.loc.aColor);

  gl.vertexAttribPointer(
    this.loc.aColor,
    3,
    gl.FLOAT,
    false,
    BYTES,
    8
  );

  gl.uniform2f(
    this.loc.uPan,
    state.view.x,
    state.view.y
  );

  gl.uniform1f(
    this.loc.uScale,
    state.view.scale
  );

  gl.uniform2f(
    this.loc.uResolution,
    w,
    h
  );

  // FIX: chunk描画
  const CHUNK = 65535;

  for (
    let i = 0;
    i < this.vertexCount;
    i += CHUNK
  ) {

    gl.drawArrays(
      gl.LINES,
      i,
      Math.min(CHUNK, this.vertexCount - i)
    );
  }
}
</script>

<!-- ▼ DXF GPUメモリリーク修正版 -->
<script>
async function resetViewers() {

  cancelRender();

  _resizeObserver.disconnect();

  if (state.url) {
    URL.revokeObjectURL(state.url);
    state.url = null;
  }

  [
    'pdfWrap',
    'imgView',
    'text',
    'cadView',
    'list',
    'fallback',
    'overlay'
  ].forEach(k => hideEl(els[k]));

  if (state.renderer) {

    try {
      state.renderer.dispose?.();
    } catch(e){}

    state.renderer = null;
  }

  if (state.dxf) {

    try {

      state.dxf.Dispose
        ? state.dxf.Dispose()
        : state.dxf.Clear?.();

      // FIX: WebGL強制解放
      const gl =
        state.dxf
          ?.renderer
          ?.renderer
          ?.getContext?.();

      gl
        ?.getExtension('WEBGL_lose_context')
        ?.loseContext();

    } catch(e){}

    state.dxf = null;
  }

  els.cadView.onclick = null;

  if (state.pdfDoc) {

    try {
      await state.pdfDoc.destroy();
    } catch(e){}

    state.pdfDoc = null;
  }

  if (state.archive?.reader) {

    try {
      await state.archive.reader.close();
    } catch(e){}
  }

  state.archive = null;

  state.jwwDoc = null;

  state.pdfAnnotations = {};

  state.pdfTouchBound = false;

  state.pdfPage = 1;

  state.pdfScale = 1;

  state.pdfRenderToken = 0;

  ToolManager.set('pan');

  els.measureBtn.classList.remove('active');

  state.measurePts = [];

  teardownCadControls();

  const ov = els.cadOverlay;

  if (ov) {

    ov.getContext('2d')
      .clearRect(
        0,
        0,
        ov.width,
        ov.height
      );
  }

  if (state.renderCache.imageBitmap) {

    state.renderCache.imageBitmap.close();

    state.renderCache.imageBitmap = null;
  }

  state.renderCache.dirty = true;

  releaseCanvas(els.cad);
  releaseCanvas(els.cadOverlay);

  releaseCanvas(els.pdf);
  releaseCanvas(els.pdfOverlay);

  els.imgView.onpointerdown = null;
  els.imgView.onpointermove = null;
  els.imgView.onpointerup   = null;

  state.gesture.activePointers.clear();

  state.gesture.isPanning = false;

  state.gesture.pinchStart = 0;
}
</script>

<!-- ▼ 画像ピンチズーム対応 -->
<script>
function enableImagePanZoom() {

  let last = null;

  let pan = false;

  let pinchStart = 0;
  let pinchScale = 1;

  els.imgView.onpointerdown = e => {

    pan = true;

    last = {
      x: e.clientX - state.imgX,
      y: e.clientY - state.imgY
    };

    els.imgView.setPointerCapture(e.pointerId);
  };

  els.imgView.onpointermove = e => {

    if (!pan) return;

    state.imgX = e.clientX - last.x;
    state.imgY = e.clientY - last.y;

    updateImgTransform();
  };

  els.imgView.onpointerup = () => {
    pan = false;
  };

  els.imgView.ontouchmove = e => {

    if (e.touches.length !== 2) return;

    e.preventDefault();

    const t1 = e.touches[0];
    const t2 = e.touches[1];

    const dist = Math.hypot(
      t2.clientX - t1.clientX,
      t2.clientY - t1.clientY
    );

    if (!pinchStart) {

      pinchStart = dist;
      pinchScale = state.scale;

      return;
    }

    state.scale =
      pinchScale *
      (dist / pinchStart);

    updateImgTransform();

  };

  els.imgView.ontouchend = () => {
    pinchStart = 0;
  };
}
</script>

<!-- ▼ saveRecent quota修正版 -->
<script>
async function saveRecent(file) {

  if (!db) return;

  if (file.size > 5 * 1024 * 1024) return;

  try {

    const estimate =
      await navigator.storage?.estimate?.();

    console.log(
      'Storage:',
      estimate?.usage,
      '/',
      estimate?.quota
    );

  } catch(e){}

  return new Promise(resolve => {

    try {

      const tx =
        db.transaction(
          'recents',
          'readwrite'
        );

      const store =
        tx.objectStore('recents');

      store.add({
        name:file.name,
        blob:file,
        ts:Date.now()
      });

      tx.oncomplete = async () => {

        const tx2 =
          db.transaction(
            'recents',
            'readwrite'
          );

        const store2 =
          tx2.objectStore('recents');

        const req =
          store2.getAll();

        req.onsuccess = () => {

          const items =
            req.result.sort(
              (a,b)=>a.ts-b.ts
            );

          if (items.length > 10) {

            items
              .slice(0, items.length-10)
              .forEach(it=>{
                store2.delete(it.id);
              });
          }

          tx2.oncomplete = () => {
            loadRecents();
            resolve();
          };
        };
      };

      tx.onerror = e => {

        console.warn(
          'IndexedDB write failed',
          e
        );

        resolve();
      };

    } catch(e) {

      console.warn(
        'IndexedDB quota',
        e
      );

      resolve();
    }
  });
}
</script>

<!-- ▼ WebGL restore失敗時 fallback -->
<script>
this.canvas.addEventListener(
  'webglcontextrestored',
  () => {

    try {

      console.warn(
        '[WebGL] context restored'
      );

      this._init();

      this.fit();

      scheduleRender();

    } catch(e) {

      console.warn(
        '[WebGL] restore failed → Canvas2D fallback'
      );

      state.renderer =
        new JWWRenderer(
          els.cad,
          this.doc
        );

      state.renderer.fit();

      scheduleRender();
    }

  },
  false
);
</script>

<!-- ▼ jwwZoom LOD高速化 -->
<script>
state.renderCache.lastScale = 1;

function jwwZoom(factor) {

  const cx = els.cad.width / 2;
  const cy = els.cad.height / 2;

  const wx =
    (cx - state.view.x) /
    state.view.scale;

  const wy =
    (cy - state.view.y) /
    state.view.scale;

  const prevScale =
    state.view.scale;

  state.view.scale *= factor;

  state.view.x =
    cx - wx * state.view.scale;

  state.view.y =
    cy - wy * state.view.scale;

  // FIX: LOD差分判定
  const diff =
    Math.abs(
      state.view.scale -
      state.renderCache.lastScale
    ) /
    state.renderCache.lastScale;

  if (
    !(state.renderer instanceof WebGLRenderer)
  ) {

    if (diff > 0.25) {

      state.renderCache.dirty = true;

      state.renderCache.lastScale =
        state.view.scale;
    }
  }

  scheduleRender();

  els.cadOverlay
    .getContext('2d')
    .clearRect(
      0,
      0,
      els.cadOverlay.width,
      els.cadOverlay.height
    );

  state.measurePts = [];
}
</script>
