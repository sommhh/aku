<!-- 配置場所推奨：
     class JWWRenderer extends BaseRenderer { ... }
     の下へ追加 -->

<script>
/* ═══════════════════════════════════════════════════════════
   WebGLRenderer v1
   - JWW高速GPU描画
   - 10万〜100万line向け
   - Safari/iPhone対応
   - ContextLost復旧
   - Layer対応準備
   ═══════════════════════════════════════════════════════════ */

class WebGLRenderer extends BaseRenderer {

  constructor(canvas, doc) {
    super(canvas);

    this.doc = doc;

    this.gl =
      canvas.getContext('webgl', {
        antialias: false,
        alpha: false,
        preserveDrawingBuffer: false,
        powerPreference: 'high-performance'
      }) ||
      canvas.getContext('experimental-webgl');

    if (!this.gl) {
      throw new Error('WebGL未対応');
    }

    this.program = null;

    this.buffers = {
      line: null
    };

    this.locations = {};

    this.vertexCount = 0;

    this.vertexData = null;

    this.initialized = false;

    this.setupContextEvents();

    this.init();
  }

  /* ─────────────────────────────
     ContextLost
     ───────────────────────────── */
  setupContextEvents() {

    this.canvas.addEventListener(
      'webglcontextlost',
      e => {
        e.preventDefault();
        console.warn('WebGL context lost');
      },
      false
    );

    this.canvas.addEventListener(
      'webglcontextrestored',
      () => {
        console.warn('WebGL context restored');
        this.init();
        this.fit();
        scheduleRender();
      },
      false
    );
  }

  /* ─────────────────────────────
     shader compile
     ───────────────────────────── */
  createShader(type, source) {

    const gl = this.gl;

    const shader = gl.createShader(type);

    gl.shaderSource(shader, source);

    gl.compileShader(shader);

    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {

      const err = gl.getShaderInfoLog(shader);

      gl.deleteShader(shader);

      throw new Error(err);
    }

    return shader;
  }

  createProgram(vsSource, fsSource) {

    const gl = this.gl;

    const vs = this.createShader(gl.VERTEX_SHADER, vsSource);

    const fs = this.createShader(gl.FRAGMENT_SHADER, fsSource);

    const program = gl.createProgram();

    gl.attachShader(program, vs);

    gl.attachShader(program, fs);

    gl.linkProgram(program);

    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {

      throw new Error(gl.getProgramInfoLog(program));
    }

    return program;
  }

  /* ─────────────────────────────
     init
     ───────────────────────────── */
  init() {

    const gl = this.gl;

    const vs = `
attribute vec2 aPos;

uniform vec2 uPan;
uniform float uScale;
uniform vec2 uResolution;

void main(){

  vec2 p = (aPos * uScale) + uPan;

  vec2 clip = ((p / uResolution) * 2.0) - 1.0;

  gl_Position = vec4(
    clip.x,
   -clip.y,
    0.0,
    1.0
  );
}
`;

    const fs = `
precision mediump float;

void main(){
  gl_FragColor = vec4(
    0.1,
    0.1,
    0.1,
    1.0
  );
}
`;

    this.program = this.createProgram(vs, fs);

    gl.useProgram(this.program);

    this.locations = {

      aPos: gl.getAttribLocation(
        this.program,
        'aPos'
      ),

      uPan: gl.getUniformLocation(
        this.program,
        'uPan'
      ),

      uScale: gl.getUniformLocation(
        this.program,
        'uScale'
      ),

      uResolution: gl.getUniformLocation(
        this.program,
        'uResolution'
      )
    };

    this.buildBuffers();

    this.initialized = true;
  }

  /* ─────────────────────────────
     JWW → Float32Array
     ───────────────────────────── */
  buildBuffers() {

    const gl = this.gl;

    const verts = [];

    const ents = this.doc.entities;

    for (let i = 0; i < ents.length; i++) {

      const e = ents[i];

      if (e.type === 'LINE') {

        verts.push(
          e.x1, e.y1,
          e.x2, e.y2
        );
      }

      else if (e.type === 'POLYLINE') {

        const pts = e.points;

        for (let j = 0; j < pts.length - 1; j++) {

          verts.push(
            pts[j].x,
            pts[j].y,
            pts[j + 1].x,
            pts[j + 1].y
          );
        }

        if (e.closed && pts.length > 2) {

          verts.push(
            pts[pts.length - 1].x,
            pts[pts.length - 1].y,
            pts[0].x,
            pts[0].y
          );
        }
      }

      else if (e.type === 'CIRCLE') {

        const seg = 48;

        for (let a = 0; a < seg; a++) {

          const t1 = (a / seg) * Math.PI * 2;

          const t2 = ((a + 1) / seg) * Math.PI * 2;

          verts.push(
            e.cx + Math.cos(t1) * e.r,
            e.cy + Math.sin(t1) * e.r,

            e.cx + Math.cos(t2) * e.r,
            e.cy + Math.sin(t2) * e.r
          );
        }
      }

      else if (e.type === 'ARC') {

        const seg = 32;

        for (let a = 0; a < seg; a++) {

          const t1 =
            e.a0 +
            ((e.a1 - e.a0) * a) / seg;

          const t2 =
            e.a0 +
            ((e.a1 - e.a0) * (a + 1)) / seg;

          verts.push(
            e.cx + Math.cos(t1) * e.r,
            e.cy + Math.sin(t1) * e.r,

            e.cx + Math.cos(t2) * e.r,
            e.cy + Math.sin(t2) * e.r
          );
        }
      }
    }

    this.vertexData = new Float32Array(verts);

    this.vertexCount =
      this.vertexData.length / 2;

    if (this.buffers.line) {
      gl.deleteBuffer(this.buffers.line);
    }

    this.buffers.line =
      gl.createBuffer();

    gl.bindBuffer(
      gl.ARRAY_BUFFER,
      this.buffers.line
    );

    gl.bufferData(
      gl.ARRAY_BUFFER,
      this.vertexData,
      gl.STATIC_DRAW
    );
  }

  /* ─────────────────────────────
     fit
     ───────────────────────────── */
  fit() {

    const bb =
      jwwBoundingBox(this.doc.entities);

    state.world = bb;

    const vw =
      (bb.maxX - bb.minX) || 1;

    const vh =
      (bb.maxY - bb.minY) || 1;

    const pad = 40;

    const sx =
      (this.canvas.width - pad * 2) / vw;

    const sy =
      (this.canvas.height - pad * 2) / vh;

    state.view.scale =
      Math.min(sx, sy);

    state.view.x =
      pad - bb.minX * state.view.scale;

    state.view.y =
      this.canvas.height -
      pad +
      bb.minY * state.view.scale;

    scheduleRender();
  }

  /* ─────────────────────────────
     render
     ───────────────────────────── */
  render() {

    if (!this.initialized) return;

    const gl = this.gl;

    gl.viewport(
      0,
      0,
      this.canvas.width,
      this.canvas.height
    );

    gl.clearColor(
      1,
      1,
      1,
      1
    );

    gl.clear(gl.COLOR_BUFFER_BIT);

    gl.useProgram(this.program);

    gl.bindBuffer(
      gl.ARRAY_BUFFER,
      this.buffers.line
    );

    gl.enableVertexAttribArray(
      this.locations.aPos
    );

    gl.vertexAttribPointer(
      this.locations.aPos,
      2,
      gl.FLOAT,
      false,
      0,
      0
    );

    gl.uniform2f(
      this.locations.uPan,
      state.view.x,
      state.view.y
    );

    gl.uniform1f(
      this.locations.uScale,
      state.view.scale
    );

    gl.uniform2f(
      this.locations.uResolution,
      this.canvas.width,
      this.canvas.height
    );

    gl.drawArrays(
      gl.LINES,
      0,
      this.vertexCount
    );
  }

  /* ─────────────────────────────
     cleanup
     ───────────────────────────── */
  dispose() {

    const gl = this.gl;

    try {

      if (this.buffers.line) {
        gl.deleteBuffer(this.buffers.line);
      }

      if (this.program) {
        gl.deleteProgram(this.program);
      }

      const lose =
        gl.getExtension(
          'WEBGL_lose_context'
        );

      lose?.loseContext();

    } catch (e) {
      console.warn(e);
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   openJWW 改造版
   - GPU renderer自動選択
   ═══════════════════════════════════════════════════════════ */

async function openJWW(file) {

  showEl(els.cadView);

  showEl(els.overlay, 'block');

  const buf =
    await file.arrayBuffer();

  const doc =
    parseJww(buf);

  if (
    doc.entities.length >
    1000000
  ) {

    showFallback(
      `巨大図面 (${doc.entities.length.toLocaleString()} entities)`
    );

    return;
  }

  state.jwwDoc = doc;

  state.dxf = null;

  resizeCadCanvases();

  try {

    state.renderer =
      new WebGLRenderer(
        els.cad,
        doc
      );

  } catch (e) {

    console.warn(
      'WebGL fallback',
      e
    );

    state.renderer =
      new JWWRenderer(
        els.cad,
        doc
      );
  }

  _resizeObserver.observe(
    els.cadView
  );

  await new Promise(r =>
    requestAnimationFrame(r)
  );

  state.renderer.fit();

  setupCadControls();

  showDXFControls();
}

/* ═══════════════════════════════════════════════════════════
   resetViewers 強化
   ═══════════════════════════════════════════════════════════ */

const _origReset = resetViewers;

resetViewers = async function() {

  cancelRender();

  _resizeObserver.disconnect();

  if (
    state.renderer &&
    state.renderer.dispose
  ) {

    try {
      state.renderer.dispose();
    } catch(e){}
  }

  if (state.pdfDoc) {

    try {
      await state.pdfDoc.destroy();
    } catch(e){}

    state.pdfDoc = null;
  }

  if (state.archive?.reader) {

    try {
      await state.archive.reader.close();
    } catch(e){}
  }

  state.archive = null;

  _origReset();
};

/* ═══════════════════════════════════════════════════════════
   drawPDFPage race fix
   ═══════════════════════════════════════════════════════════ */

state.pdfRenderToken = 0;

const _origDrawPDFPage =
  drawPDFPage;

drawPDFPage = async function() {

  const token =
    ++state.pdfRenderToken;

  if (!state.pdfDoc) return;

  const page =
    await state.pdfDoc.getPage(
      state.pdfPage
    );

  if (
    token !==
    state.pdfRenderToken
  ) return;

  const cw =
    els.pdfWrap.clientWidth ||
    window.innerWidth;

  const vb =
    page.getViewport({ scale:1 });

  const bs =
    (cw / vb.width) * 0.95;

  const dpr = getDpr();

  const vp =
    page.getViewport({
      scale:
        bs *
        state.pdfScale *
        dpr
    });

  const MAX = 4096;

  els.pdf.width =
    Math.min(vp.width, MAX);

  els.pdf.height =
    Math.min(vp.height, MAX);

  els.pdfOverlay.width =
    Math.min(vp.width, MAX);

  els.pdfOverlay.height =
    Math.min(vp.height, MAX);

  const ctx =
    els.pdf.getContext('2d');

  await page.render({
    canvasContext: ctx,
    viewport: vp,
    intent: 'display'
  }).promise;

  if (
    token !==
    state.pdfRenderToken
  ) return;

  els.pageInfo.textContent =
    `${state.pdfPage}/${state.pdfDoc.numPages}`;

  await loadAnnotation();

  redrawAnnotations();
};

/* ═══════════════════════════════════════════════════════════
   FPS改善
   ═══════════════════════════════════════════════════════════ */

document.addEventListener(
  'visibilitychange',
  () => {

    if (document.hidden) {

      cancelRender();

    } else {

      scheduleRender();
    }
  }
);

/* ═══════════════════════════════════════════════════════════
   iOS GPU memory cleanup
   ═══════════════════════════════════════════════════════════ */

window.addEventListener(
  'pagehide',
  () => {

    try {

      if (
        state.renderer &&
        state.renderer.dispose
      ) {

        state.renderer.dispose();
      }

    } catch(e){}
  }
);

console.log(
  'WebGLRenderer v1 loaded'
);
</script>
