<!-- =========================
  安定化フル修正版
  白画面 / Safari / PDF / WebGL / DXF
  F12点検済み
========================= -->

<script>
/* =========================
   GLOBAL ERROR
========================= */

window.addEventListener('error', e => {

  console.error(
    '[GlobalError]',
    e.error || e.message
  );

  showFallback(
    e.message || 'Unknown Error'
  );
});

window.addEventListener(
  'unhandledrejection',
  e => {

    console.error(
      '[PromiseError]',
      e.reason
    );

    showFallback(
      e.reason?.message ||
      'Promise Error'
    );
  }
);

/* =========================
   SAFE UI
========================= */

function showEl(el, display='block'){

  if(!el) return;

  el.hidden = false;
  el.style.display = display;
}

function hideEl(el){

  if(!el) return;

  el.hidden = true;
  el.style.display = 'none';
}

function hideControls(){

  [
    els.pdfControls,
    els.imageControls,
    els.cadControls
  ].forEach(hideEl);
}

/* =========================
   CANVAS RELEASE
========================= */

function releaseCanvas(canvas){

  if(!canvas) return;

  try{

    const ctx =
      canvas.getContext('2d');

    ctx?.clearRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

    canvas.width = 1;
    canvas.height = 1;

  }catch(e){

    console.warn(e);
  }
}

/* =========================
   OPEN FILE
========================= */

async function openFile(file) {

  if(!file) return;

  state.file       = file;
  state.scale      = 1;
  state.imgX       = 0;
  state.imgY       = 0;
  state.dpr        = getDpr();
  state.measurePts = [];

  ToolManager.set('pan');

  await resetViewers();

  els.viewer.classList.add('show');

  els.name.textContent = file.name;

  const ext =
    file.name
      .split('.')
      .pop()
      .toLowerCase();

  try {

    hideControls();

    /* URLリーク防止 */

    if(state.url){

      URL.revokeObjectURL(state.url);

      state.url = null;
    }

    /* ZIP */

    if (ext === 'zip') {

      await openArchive(file);
      return;
    }

    /* TEXT */

    if (
      [
        'txt',
        'csv',
        'json',
        'md',
        'log'
      ].includes(ext)
    ) {

      els.text.textContent =
        await file.text();

      showEl(els.text);
    }

    /* PDF */

    else if (ext === 'pdf') {

      await renderPDF(file);

      showPDFControls();
    }

    /* IMAGE */

    else if (
      /^(png|jpe?g|webp|gif|svg)$/i
      .test(ext)
    ) {

      state.url =
        URL.createObjectURL(file);

      await new Promise(
        (resolve, reject) => {

          els.img.onload = () => {
            resolve();
          };

          els.img.onerror = reject;

          els.img.src =
            state.url;
        }
      );

      updateImgTransform();

      showEl(
        els.imgView,
        'flex'
      );

      enableImagePanZoom();

      if (
        state.imageList.length > 1
      ) {

        showImageControls();
      }
    }

    /* DXF */

    else if (ext === 'dxf') {

      if(
        file.size >
        150 * 1024 * 1024
      ){

        showFallback(
          '巨大DXF簡易モード'
        );
      }

      await loadDXF(file);

      showDXFControls();
    }

    /* DWG */

    else if (ext === 'dwg') {

      openDWG();
      return;
    }

    /* JWW */

    else if (
      /^(jww|jwc)$/i
      .test(ext)
    ) {

      await openJWW(file);
    }

    else {

      showFallback(
        `${ext.toUpperCase()}は未対応`
      );
    }

    await saveRecent(file);

  } catch (err) {

    console.error(err);

    showFallback(
      err?.message ||
      String(err)
    );
  }
}

/* =========================
   RESET VIEWERS
========================= */

async function resetViewers() {

  cancelRender();

  try{
    _resizeObserver.disconnect();
  }catch(e){}

  /* URL cleanup */

  if (state.url) {

    URL.revokeObjectURL(
      state.url
    );

    state.url = null;
  }

  [
    'pdfWrap',
    'imgView',
    'text',
    'cadView',
    'list',
    'fallback',
    'overlay'
  ].forEach(k => {

    hideEl(els[k]);
  });

  /* renderer dispose */

  if (state.renderer) {

    try{
      state.renderer.dispose?.();
    }catch(e){}

    state.renderer = null;
  }

  /* DXF cleanup */

  if (state.dxf) {

    try {

      state.dxf.Dispose?.();

      const gl =
        state.dxf
          ?.renderer
          ?.renderer
          ?.getContext?.();

      gl
        ?.getExtension(
          'WEBGL_lose_context'
        )
        ?.loseContext();

    } catch(e){}

    state.dxf = null;
  }

  /* PDF cleanup */

  if (state.pdfRenderTask) {

    try{
      state.pdfRenderTask.cancel();
    }catch(e){}

    state.pdfRenderTask = null;
  }

  if (state.pdfDoc) {

    try{
      await state.pdfDoc.destroy();
    }catch(e){}

    state.pdfDoc = null;
  }

  /* archive */

  if (state.archive?.reader) {

    try{
      await state.archive.reader.close();
    }catch(e){}
  }

  state.archive = null;

  state.jwwDoc = null;

  state.pdfAnnotations = {};

  state.pdfTouchBound = false;

  state.pdfPage = 1;

  state.pdfScale = 1;

  state.pdfRenderToken = 0;

  ToolManager.set('pan');

  state.measurePts = [];

  teardownCadControls();

  if (els.cadOverlay) {

    els.cadOverlay
      .getContext('2d')
      ?.clearRect(
        0,
        0,
        els.cadOverlay.width,
        els.cadOverlay.height
      );
  }

  if (
    state.renderCache
      ?.imageBitmap
  ) {

    state.renderCache
      .imageBitmap
      .close();

    state.renderCache
      .imageBitmap = null;
  }

  state.renderCache.dirty = true;

  releaseCanvas(els.cad);
  releaseCanvas(els.cadOverlay);

  releaseCanvas(els.pdf);
  releaseCanvas(els.pdfOverlay);

  els.imgView.onpointerdown = null;
  els.imgView.onpointermove = null;
  els.imgView.onpointerup   = null;

  state.gesture
    .activePointers
    .clear();

  state.gesture.isPanning = false;

  state.gesture.pinchStart = 0;
}

/* =========================
   PDF DRAW
========================= */

async function drawPDFPage() {

  if (!state.pdfDoc) return;

  const token =
    ++state.pdfRenderToken;

  try {

    if (state.pdfRenderTask) {
      state.pdfRenderTask.cancel();
    }

  } catch(e){}

  let page;

  try {

    page =
      await state.pdfDoc.getPage(
        state.pdfPage
      );

  } catch(e){

    console.warn(
      'PDF cancelled'
    );

    return;
  }

  if (
    token !== state.pdfRenderToken ||
    !state.pdfDoc
  ) return;

  const wrapW =
    els.pdfWrap.clientWidth ||
    window.innerWidth;

  const baseViewport =
    page.getViewport({
      scale:1
    });

  const baseScale =
    (wrapW /
    baseViewport.width)
    * 0.95;

  const dpr = getDpr();

  const viewport =
    page.getViewport({

      scale:
        baseScale *
        state.pdfScale *
        dpr
    });

  const MAX = 4096;

  const ratio = Math.min(
    1,
    MAX /
    Math.max(
      viewport.width,
      viewport.height
    )
  );

  const finalW =
    Math.floor(
      viewport.width * ratio
    );

  const finalH =
    Math.floor(
      viewport.height * ratio
    );

  els.pdf.width  = finalW;
  els.pdf.height = finalH;

  els.pdfOverlay.width  = finalW;
  els.pdfOverlay.height = finalH;

  const ctx =
    els.pdf.getContext(
      '2d',
      {alpha:false}
    );

  ctx.clearRect(
    0,
    0,
    finalW,
    finalH
  );

  const renderViewport =
    page.getViewport({

      scale:
        baseScale *
        state.pdfScale *
        dpr *
        ratio
    });

  state.pdfRenderTask =
    page.render({

      canvasContext: ctx,
      viewport: renderViewport,
      intent:'display'
    });

  try {

    await state
      .pdfRenderTask
      .promise;

  } catch(e){

    if(
      e?.name !==
      'RenderingCancelledException'
    ){

      throw e;
    }

    return;
  }

  if (
    token !== state.pdfRenderToken
  ) return;

  els.pageInfo.textContent =
    `${state.pdfPage}/${state.pdfDoc.numPages}`;

  await loadAnnotation();

  redrawAnnotations();
}

/* =========================
   IMAGE PAN ZOOM
========================= */

function enableImagePanZoom() {

  let last = null;

  let pan = false;

  let pinchStart = 0;

  let pinchScale = 1;

  els.imgView.onpointerdown = e => {

    pan = true;

    last = {

      x:
        e.clientX -
        state.imgX,

      y:
        e.clientY -
        state.imgY
    };

    if(
      els.imgView
        .setPointerCapture
    ){

      try{

        els.imgView
          .setPointerCapture(
            e.pointerId
          );

      }catch(e){}
    }
  };

  els.imgView.onpointermove = e => {

    if(!pan) return;

    state.imgX =
      e.clientX - last.x;

    state.imgY =
      e.clientY - last.y;

    updateImgTransform();
  };

  els.imgView.onpointerup = () => {

    pan = false;
  };

  els.imgView.addEventListener(
    'touchmove',
    e => {

      if(
        e.touches.length !== 2
      ) return;

      e.preventDefault();

      const t1 = e.touches[0];
      const t2 = e.touches[1];

      const dist = Math.hypot(
        t2.clientX - t1.clientX,
        t2.clientY - t1.clientY
      );

      if(!pinchStart){

        pinchStart = dist;

        pinchScale =
          state.scale;

        return;
      }

      state.scale = Math.max(
        0.1,
        Math.min(
          15,
          pinchScale *
          (dist / pinchStart)
        )
      );

      updateImgTransform();

    },
    { passive:false }
  );

  els.imgView.ontouchend = () => {

    pinchStart = 0;
  };
}

/* =========================
   SAVE RECENT
========================= */

async function saveRecent(file) {

  if (!db) return;

  if (
    file.size >
    5 * 1024 * 1024
  ) return;

  return new Promise(resolve => {

    try {

      const tx =
        db.transaction(
          'recents',
          'readwrite'
        );

      const store =
        tx.objectStore(
          'recents'
        );

      store.put({

        name:file.name,
        blob:file,
        ts:Date.now()
      });

      tx.oncomplete = () => {

        loadRecents();

        resolve();
      };

      tx.onerror = e => {

        console.warn(
          'IndexedDB',
          e
        );

        resolve();
      };

    } catch(e){

      console.warn(e);

      resolve();
    }
  });
}
</script>
